worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    server {
        listen 8080;

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
            }
            root /var/www/html;
            add_header Cache-Control no-cache;
        }
    }
}

